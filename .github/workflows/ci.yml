name: Continuous Integration

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
      - name: Run repository safety checks
        run: npm run check:repository

  backend-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
          cache: npm
          cache-dependency-path: services/api/package-lock.json
      - name: Install API dependencies
        working-directory: services/api
        run: npm ci
      - name: Run API lint
        run: npm run api:lint
      - name: Run API typecheck
        run: npm run api:typecheck
      - name: Build API
        run: npm run api:build
      - name: Run API unit tests
        run: npm run api:test:unit
      - name: Run API integration tests (Docker required)
        run: npm run api:test:integration

  mobile-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json
      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: npm ci
      - name: Run mobile lint
        run: npm run mobile:lint
      - name: Run mobile typecheck
        run: npm run mobile:typecheck
      - name: Run mobile tests
        run: npm run mobile:test
